services:

  cassandra:
    image: cassandra:5.0
    container_name: cassandra_reviews
    restart: unless-stopped
    ports:
      - "127.0.0.1:9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=ReviewsCluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./cql:/cql
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - reviews_net

  redis:
    image: redis:7-alpine
    container_name: redis_reviews
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - reviews_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api_reviews
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      - CASSANDRA_HOST=cassandra
      - REDIS_HOST=redis
    depends_on:
      cassandra:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reviews_net

networks:
  reviews_net:
    driver: bridge

volumes:
  cassandra_data: